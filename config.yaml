bot:
  name: SPY_QQQ_Threshold_Rebalance
  mode: paper
  real_trading_enabled: false

market:
  region: US
  session_only: true
  trade_premarket: false
  trade_afterhours: false
  intraday_trading: false

strategy:
  type: fixed_allocation_threshold_rebalance
  name: spy_qqq_threshold_rebalance

portfolio:
  target_weights:
    SPY: 0.50
    QQQ: 0.50

capital:
  currency: EUR
  total_target_exposure_eur: 400      # modo real: 200 SPY + 200 QQQ
  allow_fractional_shares: true
  fallback_fx_rate: 1.08

# Overrides aplicados SOLO cuando bot.mode == paper (capital de prueba grande
# para que la simulación con dinero falso sea visible). En modo real se usan
# los valores base de arriba (400 EUR) y los del kill switch (20/40 EUR).
paper_mode:
  total_target_exposure_eur: 10000
  max_total_exposure_eur: 10000
  max_daily_loss_eur: 1000
  max_weekly_loss_eur: 2000

rebalance:
  method: threshold
  threshold_absolute_weight: 0.05
  min_trade_value_eur: 10
  check_frequency: monthly

orders:
  type: limit
  buy_limit_buffer: 0.002
  sell_limit_buffer: 0.002
  cancel_unfilled_end_of_day: true
  prevent_duplicate_orders: true

risk:
  allow_margin: false
  allow_short: false
  allow_leverage: false
  max_total_exposure_eur: 400         # modo real (paper usa paper_mode)
  max_symbols:
    - SPY
    - QQQ
  max_orders_per_run: 4

kill_switch:
  enabled: true
  max_daily_loss_eur: 20              # modo real (paper usa paper_mode)
  max_weekly_loss_eur: 40
  max_order_error_count: 1
  stop_if_data_missing: true
  stop_if_price_stale: true
  stop_if_broker_unreachable: true
  stop_if_unexpected_position: true

logging:
  save_portfolio_decisions: true
  save_orders: true
  save_errors: true
  save_rejected_actions: true
  directory: logs
